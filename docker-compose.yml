services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kanbitan
      POSTGRES_USER: kanbitan
      POSTGRES_PASSWORD: kanbitan
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanbitan -d kanbitan"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
